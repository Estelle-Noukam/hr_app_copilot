{% extends "base.html" %}
{% block title %}Absence{% endblock %}
{% block content %}
<h2>{{ title }}</h2>
<form method="post">
    {{ form.hidden_tag() }}
    <label>Employé</label>
    {{ form.employee_id() }}
    <label>Date</label>
    {{ form.date() }}
    <label>Raison</label>
    {{ form.reason() }}
    <label>Justifiée</label>
    {{ form.justified() }}
    {{ form.submit(class_="btn") }}
</form>
{% endblock %}
