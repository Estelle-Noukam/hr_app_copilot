{% extends "layout.html" %}
{% block content %}
<h1>Connexion</h1>

<form method="post">
    <p>
        <label>Email</label><br>
        <input type="email" name="email" required>

        <label>Mot de passe</label><br>

    <button class="btn" type="submit">Connexion</button>
</form>

{% endblock %}
