{% extends "base.html" %}
{% block title %}Évaluation{% endblock %}
{% block content %}
<h2>{{ title }}</h2>
<form method="post">
    {{ form.hidden_tag() }}
    <label>Employé</label>
    {{ form.employee_id() }}
    <label>Date</label>
    {{ form.date() }}
    <label>Score</label>
    {{ form.score() }}
    <label>Commentaires</label>
    {{ form.comments() }}
    {{ form.submit(class_="btn") }}
</form>
{% endblock %}
