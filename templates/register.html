{% extends "base.html" %}
{% block title %}Créer un compte{% endblock %}
{% block content %}
<h2>Créer un compte utilisateur</h2>
<form method="post">
    {{ form.hidden_tag() }}
    <label>Email</label>
    {{ form.email() }}
    <label>Mot de passe</label>
    {{ form.password() }}
    <label>Confirmation</label>
    {{ form.confirm() }}
    <label>Rôle</label>
    {{ form.role() }}
    {{ form.submit(class_="btn") }}
</form>
{% endblock %}
