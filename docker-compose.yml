version: "3.9"

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: hr_user
      POSTGRES_PASSWORD: hr_password
      POSTGRES_DB: hr_db
    volumes:
      - hr_db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  web:
    build: .
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql+psycopg2://hr_user:hr_password@db:5432/hr_db
      SECRET_KEY: "change_this_secret_key"
      FLASK_ENV: production
    ports:
      - "5000:5000"

volumes:
  hr_db_data:
